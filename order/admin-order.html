<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard · Tevin's Tech</title>
    <link rel="stylesheet" href="../main/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .admin-header h1 { font-size: 2rem; font-family: 'Playfair Display', serif; }
        .admin-header h1 .accent { color: #6B46C1; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-secondary); padding: 1.5rem; border-radius: 1rem; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 2.5rem; font-weight: 700; color: #6B46C1; }
        .stat-label { color: #64748b; font-size: 0.9rem; }
        .orders-table { background: var(--bg-secondary); border-radius: 1rem; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--bg-primary); font-weight: 600; }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.8rem; font-weight: 500; }
        .status-new { background: #3b82f6; color: white; }
        .status-processing { background: #f59e0b; color: white; }
        .status-completed { background: #10b981; color: white; }
        .status-cancelled { background: #ef4444; color: white; }
        .view-btn, .edit-btn { background: #6B46C1; color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 0.5rem; cursor: pointer; font-size: 0.8rem; margin-right: 0.5rem; }
        .edit-btn { background: #f59e0b; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-secondary); max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; border-radius: 1rem; padding: 2rem; position: relative; }
        .close-modal { position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; cursor: pointer; }
        .refresh-btn { background: #6B46C1; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
    </style>
</head>
<body class="light-mode">
    <div class="admin-container">
        <div class="admin-header">
            <h1>📋 Order <span class="accent">Dashboard</span></h1>
            <div>
                <button class="refresh-btn" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><div class="stat-number" id="totalOrders">-</div><div class="stat-label">Total Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="newOrders">-</div><div class="stat-label">New Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="processingOrders">-</div><div class="stat-label">Processing</div></div>
            <div class="stat-card"><div class="stat-number" id="completedOrders">-</div><div class="stat-label">Completed</div></div>
        </div>
        
        <div class="orders-table">
            <table>
                <thead><tr><th>Date</th><th>Reference</th><th>Customer</th><th>Package</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="ordersTableBody"><tr><td colspan="7" class="loading">Loading orders...</td></tr></tbody>
            </table>
        </div>
    </div>
    
    <div id="orderModal" class="modal"><div class="modal-content"><span class="close-modal" onclick="closeModal()">&times;</span><div id="modalBody"></div></div></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const ADMIN_PASSWORD = 'Tev.13n';
        function checkAuth() {
            if (!localStorage.getItem('admin_auth')) {
                const pwd = prompt('Enter admin password:');
                if (pwd === ADMIN_PASSWORD) localStorage.setItem('admin_auth', 'true');
                else { document.body.innerHTML = '<div style="text-align:center; margin-top:20%;"><h1>Access Denied</h1></div>'; throw new Error('Access denied'); }
            }
        }
        checkAuth();
        
        const SUPABASE_URL = 'https://brbpwsungkpjvhlmtnyl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_9HsIna20Cq1gNjiVIYV6Hw_Pnq_KQsw';
        let supabase;
        
        async function initSupabase() { supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); await loadOrders(); }
        async function loadOrders() {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="loading">Loading orders...</td></tr>';
            try {
                const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                updateStats(data);
                displayOrders(data);
            } catch (error) { tbody.innerHTML = '<tr><td colspan="7">Error loading orders.</td></tr>'; }
        }
        function updateStats(orders) {
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('newOrders').textContent = orders.filter(o => o.order_status === 'new').length;
            document.getElementById('processingOrders').textContent = orders.filter(o => o.order_status === 'processing').length;
            document.getElementById('completedOrders').textContent = orders.filter(o => o.order_status === 'completed').length;
        }
        function displayOrders(orders) {
            const tbody = document.getElementById('ordersTableBody');
            if (orders.length === 0) { tbody.innerHTML = '<tr><td colspan="7">No orders yet.</td></tr>'; return; }
            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td>${new Date(order.created_at).toLocaleDateString()}</td>
                    <td><strong>${order.order_ref}</strong></td>
                    <td>${order.customer_name}<br><small>${order.customer_email}</small></td>
                    <td>${order.package_name}</td>
                    <td>KES ${order.amount?.toLocaleString()}</td>
                    <td><span class="status-badge status-${order.order_status}">${order.order_status}</span></td>
                    <td><button class="view-btn" onclick="viewOrder(${order.id})">View</button><button class="edit-btn" onclick="editOrder(${order.id})">Edit</button></td>
                </tr>
            `).join('');
        }
        async function viewOrder(id) {
            const { data, error } = await supabase.from('orders').select('*').eq('id', id).single();
            if (error) return;
            const features = data.features ? (Array.isArray(data.features) ? data.features : JSON.parse(data.features)) : [];
            document.getElementById('modalBody').innerHTML = `
                <h2>Order ${data.order_ref}</h2>
                <div><h3>Customer</h3><p><strong>Name:</strong> ${data.customer_name}<br><strong>Email:</strong> ${data.customer_email}<br><strong>Phone:</strong> ${data.customer_phone || '—'}</p></div>
                <div><h3>Project</h3><p><strong>Package:</strong> ${data.package_name}<br><strong>Amount:</strong> KES ${data.amount?.toLocaleString()}<br><strong>Description:</strong> ${data.project_description || '—'}</p></div>
                <div><h3>Features</h3><p>${features.length ? features.map(f => `✅ ${f}`).join('<br>') : 'None'}</p></div>
            `;
            document.getElementById('orderModal').style.display = 'flex';
        }
        async function editOrder(id) {
            const newStatus = prompt('Enter new status (new/processing/completed/cancelled):');
            if (!newStatus || !['new', 'processing', 'completed', 'cancelled'].includes(newStatus)) return;
            await supabase.from('orders').update({ order_status: newStatus }).eq('id', id);
            alert('Status updated!');
            loadOrders();
        }
        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        function logout() { localStorage.removeItem('admin_auth'); location.reload(); }
        window.onclick = function(event) { if (event.target === document.getElementById('orderModal')) closeModal(); }
        initSupabase();
    </script>
</body>
</html>
