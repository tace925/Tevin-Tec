<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard · Tevin's Tech</title>
    <link rel="stylesheet" href="../main/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .welcome-card { background: var(--bg-secondary); border-radius: 1.5rem; padding: 2rem; margin-bottom: 2rem; text-align: center; border: 1px solid var(--border); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-secondary); padding: 1.5rem; border-radius: 1rem; text-align: center; border: 1px solid var(--border); }
        .stat-number { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .orders-table { background: var(--bg-secondary); border-radius: 1rem; overflow-x: auto; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--bg-primary); font-weight: 600; }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.8rem; font-weight: 500; }
        .status-new { background: #3b82f6; color: white; }
        .status-processing { background: #f59e0b; color: white; }
        .status-completed { background: #10b981; color: white; }
        .status-cancelled { background: #ef4444; color: white; }
        .view-order-btn { background: var(--accent); color: white; border: none; padding: 0.4rem 0.8rem; border-radius: 0.5rem; cursor: pointer; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.5rem; cursor: pointer; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-secondary); max-width: 500px; width: 90%; border-radius: 1rem; padding: 2rem; position: relative; }
        .close-modal { position: absolute; top: 1rem; right: 1rem; font-size: 1.5rem; cursor: pointer; }
        .loading { text-align: center; padding: 2rem; }
    </style>
</head>
<body class="light-mode">
    <div class="world-map-bg"></div>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>My <span class="accent">Dashboard</span></h1>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
        
        <div class="welcome-card">
            <h2>Welcome, <span id="userName">Customer</span>!</h2>
            <p>Track your orders and project progress here.</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalOrders">-</div><div>Total Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="activeOrders">-</div><div>Active Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="completedOrders">-</div><div>Completed</div></div>
        </div>
        
        <div class="orders-table">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Reference</th>
                        <th>Package</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody">
                    <tr><td colspan="6" class="loading">Loading your orders...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="portal.js"></script>
</body>
</html>
