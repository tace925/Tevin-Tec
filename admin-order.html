<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard · Tevin's Tech</title>
    
    <link rel="stylesheet" href="/main/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <style>
        .admin-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .admin-header h1 { font-size: 2.2rem; font-family: 'Playfair Display', serif; margin: 0; }
        .admin-header h1 .accent { color: #6B46C1; }
        
        .refresh-btn, .logout-btn { 
            padding: 0.6rem 1.2rem; border: none; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; 
        }
        .refresh-btn { background: #6B46C1; color: white; }
        .logout-btn { background: #ef4444; color: white; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-secondary, #1f2937); padding: 1.5rem; border-radius: 1rem; text-align: center; border: 1px solid var(--border, #374151); }
        .stat-number { font-size: 2.5rem; font-weight: 700; color: #6B46C1; }
        .stat-label { color: #64748b; font-size: 0.9rem; margin-top: 0.5rem; }
        
        .orders-table { background: var(--bg-secondary, #1f2937); border-radius: 1rem; overflow-x: auto; border: 1px solid var(--border, #374151); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--border, #374151); }
        th { background: var(--bg-primary, #111827); }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.85rem; font-weight: 500; }
        .status-new { background: #3b82f6; color: white; }
        .status-processing { background: #f59e0b; color: white; }
        .status-completed { background: #10b981; color: white; }
        .status-cancelled { background: #ef4444; color: white; }
        .view-btn { background: #6B46C1; color: white; padding: 0.4rem 0.9rem; border-radius: 0.5rem; margin-right: 0.5rem; border: none; cursor: pointer; }
        .edit-btn { background: #f59e0b; color: white; padding: 0.4rem 0.9rem; border-radius: 0.5rem; border: none; cursor: pointer; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-secondary, #1f2937); max-width: 600px; width: 90%; border-radius: 1rem; padding: 2rem; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 1rem; right: 1.5rem; font-size: 2rem; cursor: pointer; }
        .loading { text-align: center; padding: 3rem; color: #888; }
    </style>
</head>
<body class="light-mode">
    <div class="admin-container">
        <div class="admin-header">
            <h1>📋 Order <span class="accent">Dashboard</span></h1>
            <div>
                <button class="refresh-btn" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Refresh</button>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalOrders">-</div><div class="stat-label">Total Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="newOrders">-</div><div class="stat-label">New Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="processingOrders">-</div><div class="stat-label">Processing</div></div>
            <div class="stat-card"><div class="stat-number" id="completedOrders">-</div><div class="stat-label">Completed</div></div>
        </div>
        
        <div class="orders-table">
            <table>
                <thead><tr><th>Date</th><th>Reference</th><th>Customer</th><th>Package</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="ordersTableBody"><tr><td colspan="7" class="loading">Loading orders...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/main/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    
    <script>
        // ====================== CONFIG ======================
        const ADMIN_PASSWORD = 'Tev.13n';
        const SUPABASE_URL = 'https://brbpwsungkpjvhlmtnyl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_9HsIna20Cq1gNjiVIYV6Hw_Pnq_KQsw';

        let supabaseClient = null;

        // ====================== INIT ======================
        function initSupabase() {
            if (supabaseClient) return;
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log("✅ Supabase connected");
        }

        function checkAuth() {
            if (!localStorage.getItem('admin_auth')) {
                const pwd = prompt('Enter admin password:');
                if (pwd === ADMIN_PASSWORD) localStorage.setItem('admin_auth', 'true');
                else {
                    document.body.innerHTML = '<h1 style="text-align:center;margin-top:20%;color:red;">Access Denied</h1>';
                    return;
                }
            }
        }

        // ====================== MAIN FUNCTIONS ======================
        async function loadOrders() {
            const tbody = document.getElementById('ordersTableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="loading">Loading orders...</td></tr>';

            try {
                initSupabase();
                const { data, error } = await supabaseClient
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                updateStats(data);
                displayOrders(data);
            } catch (err) {
                console.error(err);
                tbody.innerHTML = `<tr><td colspan="7" style="color:red;text-align:center;">Failed to load orders</td></tr>`;
            }
        }

        function updateStats(orders) {
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('newOrders').textContent = orders.filter(o => o.order_status === 'new').length;
            document.getElementById('processingOrders').textContent = orders.filter(o => o.order_status === 'processing').length;
            document.getElementById('completedOrders').textContent = orders.filter(o => o.order_status === 'completed').length;
        }

        function displayOrders(orders) {
    const tbody = document.getElementById('ordersTableBody');
    if (orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;">No orders yet</td></tr>';
        return;
    }

    console.log("🔍 Actual order data:", orders[0]); // This will help us see real column names

    tbody.innerHTML = orders.map(o => `
        <tr>
            <td>${new Date(o.created_at || o.createdAt).toLocaleDateString()}</td>
            <td><strong>${o.order_ref || o.orderRef || o.reference || '—'}</strong></td>
            <td>${o.customer_name || o.customerName || o.full_name || '—'}<br>
                <small>${o.customer_email || o.customerEmail || o.email || '—'}</small></td>
            <td>${o.package_name || o.packageName || o.package || '—'}</td>
            <td>KES ${(o.amount || 0).toLocaleString()}</td>
            <td><span class="status-badge status-${o.order_status || o.status || 'new'}">${o.order_status || o.status || 'new'}</span></td>
            <td>
                <button class="view-btn" onclick="viewOrder(${o.id})">View</button>
                <button class="edit-btn" onclick="editOrder(${o.id})">Edit</button>
            </td>
        </tr>
    `).join('');
}

        async function viewOrder(id) { /* ... keep your viewOrder function */ 
            // (I kept it short for space - use the previous version if needed)
            alert("View function working for ID: " + id);
        }

        async function editOrder(id) {
            const status = prompt("New status (new/processing/completed/cancelled):");
            if (!status) return;
            await supabaseClient.from('orders').update({order_status: status}).eq('id', id);
            alert("Updated!");
            loadOrders();
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function logout() {
            localStorage.removeItem('admin_auth');
            location.reload();
        }

        // ====================== START ======================
        window.onload = () => {
            checkAuth();
            initSupabase();
            loadOrders();
        };

        // Make functions global
        window.loadOrders = loadOrders;
        window.viewOrder = viewOrder;
        window.editOrder = editOrder;
        window.closeModal = closeModal;
        window.logout = logout;
    </script>

    <nav class="desktop-nav">
        <a href="order.html">ORDER</a>
    </nav>
</body>
</html>
