<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager - Tevin's Tech</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Admin specific styles */
    body {
      background: linear-gradient(135deg, #6B46C1, #553C9A);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    
    .admin-container {
      max-width: 400px;
      width: 100%;
    }
    
    .admin-card {
      background: white;
      border-radius: 2rem;
      padding: 3rem 2rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    
    .dark-mode .admin-card {
      background: #2D3748;
      color: #F7FAFC;
    }
    
    .admin-logo {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Playfair Display', serif;
      margin-bottom: 1.5rem;
    }
    
    .admin-logo .accent {
      color: #FFB347;
    }
    
    .admin-note {
      color: #718096;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    
    #nc-root {
      margin-top: 1rem;
    }
  </style>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <div class="admin-container">
    <div class="admin-card">
      <div class="admin-logo">TEVIN'S<span class="accent">TECH</span></div>
      <p class="admin-note">Content Management Dashboard</p>
      <div id="nc-root"></div>
    </div>
  </div>
  
  <!-- Include Decap CMS with config path -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <!-- IMPORTANT: This tells CMS where to find your config.yml -->
  <script>
    // Initialize CMS with config path
    window.CMS_CONFIG_URL = '/admin/config.yml';
    
    // Handle Netlify Identity events
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', (user) => {
        if (!user) {
          window.netlifyIdentity.on('login', () => {
            document.location.href = '/admin/';
          });
        }
      });
    }
  </script>
</body>
</html>
