# admin/config.yml
backend:
  name: git-gateway
  branch: main

media_folder: "assets/images"        # Where uploaded images go
public_folder: "/assets/images"       # Public URL path

# SITE SETTINGS (Editable in Admin)
collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "_data/settings.json"
        fields:
          - { label: "Site Title", name: "site_title", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Contact Email", name: "contact_email", widget: "string" }
          - { label: "Contact Phone", name: "contact_phone", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }

  - name: "projects"
    label: "Portfolio Projects"
    folder: "_data/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Client", name: "client", widget: "string" }
      - { label: "Category", name: "category", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Technologies", name: "tech", widget: "list" }
      - { label: "Project URL", name: "url", widget: "string", required: false }
      - { label: "Featured Image", name: "image", widget: "image" }
      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false

  - name: "team"
    label: "Team Members"
    folder: "_data/team"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Bio", name: "bio", widget: "text" }
      - { label: "Photo", name: "image", widget: "image" }
      - { label: "GitHub URL", name: "github", widget: "string", required: false }
      - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }

  - name: "testimonials"
    label: "Testimonials"
    folder: "_data/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Client Name", name: "client", widget: "string" }
      - { label: "Client Title", name: "title", widget: "string" }
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Rating", name: "rating", widget: "number", min: 1, max: 5 }